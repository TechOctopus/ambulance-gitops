apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace:
  wac-hospital # chceme tieto objekty umiestniť do `wac-hospital` namespace
  # tento zapis preťaží hodnoty "namespace" vo všetkých objektoch
labels:
  - pairs:
      app.kubernetes.io/part-of: wac-hospital

resources:
  - ../../../apps/hd55-ambulance-webapi

patches:
  - path: patches/ambulance-webapi.service.yaml

components:
  - https://github.com/TechOctopus/ambulance-webapi//deployments/kustomize/components/mongodb
